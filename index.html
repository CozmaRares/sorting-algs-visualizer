<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sorting Algorithms</title>
    <link rel="stylesheet" type="text/css" href="./styles.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.2.0/css/all.min.css"
      integrity="sha512-xh6O/CkQoPOWDdYTDqeRdPCVd1SpvCA9XXcUnZS2FmJNp1coAFzvtCN9BmamE+4aHK8yyUHUSCcJHgXloTyT2A=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script
      defer
      type="text/javascript"
      src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.1/p5.js"
    ></script>
    <script
      defer
      type="text/javascript"
      src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.1/addons/p5.sound.min.js"
    ></script>
    <script defer src="js/sorts.js"></script>
    <script defer src="js/utils.js"></script>
    <script defer src="js/sketch.js"></script>
  </head>
  <body>
    <aside>
      <button onclick="startSorting()">Start</button>
      <button onclick="openModal()">Config</button>
    </aside>
    <main>
      <div
        style="
          text-align: center;
          text-transform: capitalize;
          margin-bottom: 2rem;
        "
      >
        <div>Current algorithm:</div>
        <span data-selected>Quick</span>
      </div>
      <div id="container"></div>
    </main>
    <footer>
      <a
        href="https://github.com/CozmaRares/sorting-algs-visualizer"
        target="_blank"
        rel="noopener noreferrer"
      >
        Github <i class="fa-brands fa-github"></i>
      </a>
    </footer>
    <div class="modal">
      <div class="modal-container">
        <div class="dropdown">
          <div onclick="toggleDropdown()">
            <span data-selected>quick</span>
            <i class="fa-solid fa-caret-down"></i>
          </div>
          <ul data-dropdown-list>
            <li>bubble</li>
            <li>cocktail shaker</li>
            <li>insertion</li>
            <li>binary insertion</li>
            <li>gnome</li>
            <li>optimized gnome</li>
            <li>odd / even</li>
            <li>comb</li>
            <li>shell</li>
            <li>selection</li>
            <li>double selection</li>
            <li>heap</li>
            <li>in place merge</li>
            <li>quick</li>
            <li>intro</li>
          </ul>
        </div>
      </div>
    </div>
    <script>
      document.body.className =
        getComputedStyle(document.body).getPropertyValue("--dark") === "true"
          ? "dark"
          : "light";

      function openModal() {
        document.querySelector(".modal").classList.add("active");

        const outsideClose = e => {
          const modal = document.querySelector(".modal");

          console.log(modal.contains(e.target));
          console.log(e.target);

          if (e.target != modal && modal.contains(e.target)) return;

          closeDropdown();
          modal.classList.remove("active");
          document.removeEventListener("click", outsideClose);
        };

        setTimeout(() => document.addEventListener("click", outsideClose), 1);
      }

      function toggleDropdown() {
        document.querySelector(".dropdown").classList.toggle("active");
      }

      function closeDropdown() {
        document.querySelector(".dropdown").classList.remove("active");
      }
    </script>
  </body>
</html>
